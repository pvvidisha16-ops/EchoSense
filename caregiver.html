<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>EchoSense Caregiver</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">

<div class="logo">
<span class="logo-icon">🎤</span>
<h1>EchoSense</h1>
</div>

<p>AI Voice Emergency Monitoring System</p>

</div>

<div class="container">

<h2>Caregiver Dashboard</h2>

<p class="live-status">● LIVE MONITORING</p>

<input id="patientLinkID" placeholder="Enter Patient ID">

<br>

<button class="btn" onclick="connectPatient()">Connect</button>

<div id="dashboard" style="display:none;">

<br>

<a href="detail.html">
<button class="btn">Patient Details</button>
</a>

<a href="vitals.html">
<button class="btn">Vitals Monitor</button>
</a>
<h3>Alerts <span id="alertCount">0</span></h3>

<button class="btn clear-btn" onclick="clearAlerts()">Clear Alerts</button>

<ul id="alerts"></ul>

</div>

</div>


<!-- POPUP OVERLAY -->

<div id="popupOverlay" class="popup-overlay"></div>


<!-- ALERT POPUP -->

<div id="alertPopup" class="alert-popup">

<h2>🚨 Patient Alert</h2>

<p id="popupText"></p>

<div class="popup-buttons">

<button onclick="acknowledgeAlert()" class="btn">Acknowledge</button>

<button onclick="escalateAlert()" class="btn escalate-btn">Escalate</button>

</div>

</div>


<audio id="alertSound" src="alert.mp3"></audio>

<script src="scripts.js"></script>

</body>

</html>
